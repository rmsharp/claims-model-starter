[project]
name = "model-project-constructor-data-agent"
version = "0.1.0"
description = "Standalone Data Agent: generate SQL, run quality checks, produce DataReport. Usable as CLI, Python API, or pipeline component."
readme = "USAGE.md"
requires-python = ">=3.11"
license = { text = "Proprietary" }
authors = [
    { name = "R. Mark Sharp" },
]
dependencies = [
    "pydantic>=2.6,<3",
    "langgraph>=0.2,<0.3",
    "sqlparse>=0.5",
    "sqlalchemy>=2.0,<3",
    "anthropic>=0.40",
    "typer>=0.12",
]

[project.scripts]
model-data-agent = "model_project_constructor_data_agent.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/model_project_constructor_data_agent"]
