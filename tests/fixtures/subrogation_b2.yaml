schema: intake_fixture/v1
stakeholder_id: stakeholder_claims_b2
session_id: intake_subrogation_b2
domain: pc_claims
initial_problem: >-
  Subrogation recovery rates have dropped since rolling out a new claims system;
  we want a model that helps adjusters flag recoverable claims and prompts them
  to capture required evidence during intake.

# B2-specific richer fixture: 15 qa_pairs. Extended in Session 27 beyond the
# initial 10 to pre-answer the three gaps Claude Opus 4.7 flagged in Session 26's
# `run_b2_live`: latency SLA, per-successful-claim recovery $, and fairness/bias
# plan. Two additional padding entries cover retraining cadence and incident
# response — topics the interviewer prompt tends to probe late in the
# conversation. The original subrogation.yaml has 7 qa_pairs + draft_after=7
# which works for the FixtureLLMClient but not for real Anthropic (the LLM
# picks its own questions and its own believe_enough_info trigger, so
# draft_after is a no-op in --llm both mode).
qa_pairs:
  - question: "Can you describe the business problem in your own words?"
    answer: >-
      Since we deployed the new claims system ~14 months ago our subrogation
      recovery rate dropped roughly 20%. That's millions of dollars a year
      we're not recovering from at-fault parties.
  - question: "What do you believe is causing the drop in recovery?"
    answer: >-
      Adjusters aren't capturing the information we need to pursue subrogation:
      police reports, the other party's insurer, clear fault evidence. The new
      UI makes those fields easy to skip and there's no KPI tying adjuster
      performance to subrogation outcomes.
  - question: "What solution have you been considering?"
    answer: >-
      A prompt-based system embedded in the claims workflow that reminds
      adjusters to collect the required evidence, and a scoring model that
      flags claims likely to succeed in subrogation so we can prioritize them.
  - question: "If a model were to help, what would it predict and on what features?"
    answer: >-
      A binary classification: 1 = subrogation succeeded, 0 = did not. Features
      would include completeness of captured info, adjuster experience, claim
      type, time from incident to filing, damage amount, and evidence of fault.
  - question: "What data do we have available for training?"
    answer: >-
      Our claims datawarehouse has records back to 2020 including outcomes.
      We also have adjuster metadata and the structured intake fields from the
      old and new systems.
  - question: "How would you estimate the annual value of success?"
    answer: >-
      Subrogation recovery is roughly $30M/yr. A 10% lift is ~$3M annually
      and I'd guess we could get somewhere between $2M and $4M. Average
      recovery per successful subrogation is ~$7,500 (median ~$4,200); the
      $30M/yr figure comes from roughly 4,000 successful recoveries annually.
  - question: "Do any adjuster or claimant attributes we'd use count as protected?"
    answer: >-
      No — we deliberately exclude protected attributes. The model uses claim
      features and adjuster tenure only.
  - question: "How many claims per year are we talking about, and what fraction have subrogation potential?"
    answer: >-
      Roughly 400,000 auto + property claims per year. Based on historical
      outcomes, about 8% end up in subrogation today; we think that could
      plausibly reach 10-12% with better evidence capture.
  - question: "How will the scored output be consumed — is this advisory or auto-decisioning?"
    answer: >-
      Advisory. Adjusters see a per-claim probability + a list of missing
      evidence items; they decide whether to pursue. No auto-decisioning;
      humans remain in the loop for every subrogation referral.
  - question: "Any other context on governance or deployment constraints we should know?"
    answer: >-
      It has to fit our existing SR 11-7 model review process. We expect
      tier-3 moderate given advisory-only use and no protected attributes.
      Adjuster workflow changes roll out on weekly cadence, so we target
      tactical cycle time rather than operational.
  - question: "What latency SLA does the scoring need to meet in the adjuster UI?"
    answer: >-
      Scores must render in the adjuster UI within 250 ms p95 at claim intake
      completion — not real-time at FNOL and not on every keystroke. The model
      re-scores on each claim update (typically a few times over the life of
      a claim), not continuously. Batch scoring nightly is acceptable as a
      fallback if the real-time path degrades.
  - question: "What's your plan for fairness and bias testing beyond excluding protected attributes?"
    answer: >-
      Pre-launch disparate-impact audit across adjuster tenure bands and claim
      geography, plus a quarterly fairness review using our existing SR 11-7
      framework. We don't use protected attributes, but we monitor outcome
      disparities by geography and claim type as proxy-bias checks. Adjuster
      demographic data is excluded; only tenure is included as a feature.
  - question: "What's the retraining cadence and what triggers a refresh?"
    answer: >-
      Quarterly retraining on a rolling 24-month window, plus triggered
      retraining if population stability index (PSI) on key features crosses
      0.25 or if AUC on the last 30-day holdout drops more than 3 points
      below the training benchmark. Model registry + champion/challenger
      handoff is handled by our existing MLOps platform.
  - question: "What does incident response look like if the model misbehaves in production?"
    answer: >-
      We have an on-call MLOps rotation; a single feature-flag toggle disables
      the prompt and the score panel and falls back to the legacy intake
      checklist. Any incident goes through our standard model-incident review
      (tier 2/3 model-risk committee) and a written post-mortem is required
      before re-enabling.
  - question: "Any other context we should capture before I draft?"
    answer: >-
      Nothing else comes to mind — the above should be enough for a first
      scoping document. Ready to see the draft.

draft_after: 15

# The draft/governance blocks below are required by the fixture schema
# validator but NOT consumed in --llm both mode — the real Anthropic client
# generates its own draft + governance from the live conversation. Only
# qa_pairs[*].answer matters for scripted-answers intake.
draft:
  business_problem: "(unused in --llm both)"
  proposed_solution: "(unused in --llm both)"
  model_solution:
    target_variable: null
    target_definition: "(unused)"
    candidate_features: []
    model_type: other
    evaluation_metrics: []
    is_supervised: false
  estimated_value:
    narrative: "(unused)"
    annual_impact_usd_low: null
    annual_impact_usd_high: null
    confidence: low
    assumptions: []

governance:
  cycle_time: tactical
  cycle_time_rationale: "(unused)"
  risk_tier: tier_3_moderate
  risk_tier_rationale: "(unused)"
  regulatory_frameworks: []
  affects_consumers: false
  uses_protected_attributes: false

review_sequence:
  - ACCEPT
